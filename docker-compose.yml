services:

  # ─────────────────────────────────────────────
  # Nginx — servidor web / proxy reverso
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-prod
    image: geopricer-nginx:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - storage_public:/var/www/html/public/storage:ro
    depends_on:
      - app
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # App — PHP-FPM (Laravel)
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: geopricer-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_public:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────────
  queue:
    image: geopricer-app:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      SKIP_INIT: "true"
    volumes:
      - storage_app:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - app
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Scheduler (cron de Laravel)
  # ─────────────────────────────────────────────
  scheduler:
    image: geopricer-app:latest
    restart: unless-stopped
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      SKIP_INIT: "true"
    volumes:
      - storage_app:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      - app
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # MySQL 8
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-geopricer}
      MYSQL_USER: ${DB_USERNAME:-geopricer}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es requerido}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD es requerido}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:
  storage_app:
  storage_public:
  app_logs:

networks:
  app-network:
    driver: bridge
