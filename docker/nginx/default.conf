server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Charset
    charset utf-8;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tamaño máximo de subida (ajustar según necesidades de imágenes)
    client_max_body_size 20M;

    # ── Assets estáticos compilados por Vite (cache agresivo) ──────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Archivos públicos estáticos (favicon, images, etc.) ───────────────
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── Archivos de storage (imágenes subidas por usuarios) ───────────────
    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Ruta principal — Laravel (Inertia) ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass              app:9000;
        fastcgi_index             index.php;
        fastcgi_param             SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        
        
        include                   fastcgi_params;
        fastcgi_intercept_errors  off;
        fastcgi_buffer_size       16k;
        fastcgi_buffers           4 16k;
        fastcgi_connect_timeout   60;
        fastcgi_send_timeout      180;
        fastcgi_read_timeout      180;
    }

    # ── Denegar acceso a dotfiles ─────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Seguridad ─────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
}
